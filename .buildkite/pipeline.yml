steps:
  - label: ":shell: Validate"
    commands:
      - "chmod +x packaging/*.sh scripts/*.sh *.sh"
      - "make validate"

  - wait

  - label: ":debian: Build Debian package"
    commands:
      - "chmod +x packaging/*.sh scripts/*.sh *.sh"
      - "make deb"
    artifact_paths:
      - "dist/*.deb"
      - "dist/*.deb.sha256"

  - wait

  - label: ":nexus: Publish Debian package"
    if: build.branch == "main" || build.tag != null
    commands:
      - 'chmod +x packaging/upload-deb.sh'
      - 'buildkite-agent artifact download "dist/*.deb" .'
      - 'export NEXUS_USER="$(buildkite-agent secret get NEXUS_USER)"'
      - 'export NEXUS_PASSWORD="$(buildkite-agent secret get NEXUS_PASSWORD)"'
      - './packaging/upload-deb.sh maps-drone-repo'